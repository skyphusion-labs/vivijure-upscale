name: build-image

# Build the vivijure-upscale RunPod serverless image and push it to GHCR.
#
# Unified image workflow (mirrors the slate image.yml shape): a pushed SemVer tag
# (v0.2.6) publishes the immutable, pinnable release image tagged with the clean
# version (0.2.6), the major.minor (0.2), and the short commit sha (sha-abc1234).
# There is NO :latest -- a RunPod endpoint template pins an explicit :version so a
# re-provision is deterministic (re-pinning the endpoint is a separate, deliberate,
# spend-gated step). A push to main that touches the image inputs still builds and
# pushes a sha-tagged image as a build smoke; workflow_dispatch allows a manual
# rebuild of any ref.
#
# Runner: GitHub-hosted ubuntu-latest. This repo is PUBLIC, so per the standing runner
# policy (public repos -> GitHub-hosted, fork-safe; private/internal -> the org fleet
# pool) the build runs in the hosted sandbox, NOT on the self-hosted fleet. The CUDA
# base (runpod/pytorch cu1281) is a tens-of-GB build; ubuntu-latest ships with only
# ~14GB free, so the "Free disk space" step below reclaims ~25-30GB of preinstalled
# toolchains this image never uses (the same pattern proven in vivijure-backend). Without
# it the docker build blows the runner disk.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - requirements.txt
      - .github/workflows/build-image.yml
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      IMAGE: ghcr.io/skyphusion-labs/vivijure-upscale
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (CUDA image needs more than the ~14GB hosted default)
        run: |
          set -eu
          echo "--- before ---"; df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          echo "--- after ---"; df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
