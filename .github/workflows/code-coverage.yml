name: code-coverage

# Minimal pytest coverage for the CPU-testable handler surface (heavy GPU deps stubbed in tests/).
# Public repo -> GitHub-hosted ubuntu-latest (fork-safe), never the fleet pool.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write
  code-quality: write
  pull-requests: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gate tools (pinned for a deterministic run)
        run: pip install ruff==0.15.20 pytest==9.1.1 pytest-cov==6.2.1
      - name: Run unit tests with coverage
        run: pytest -q --cov=handler --cov-report=xml --cov-report=term tests/
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage.xml
          language: python
