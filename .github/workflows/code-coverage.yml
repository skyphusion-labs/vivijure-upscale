name: code-coverage

# Minimal pytest coverage for the CPU-testable handler surface (heavy GPU deps stubbed in tests/).
# Public repo -> GitHub-hosted ubuntu-latest (fork-safe), never the fleet pool.
# Split into two jobs so fork PR pytest never runs with id-token: write (OIDC theft surface).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install gate tools (pinned for a deterministic run)
        run: pip install ruff==0.15.20 pytest==9.1.1 pytest-cov==6.2.1
      - name: Run unit tests with coverage
        run: pytest -q --cov=handler --cov-report=xml --cov-report=term tests/
      - name: Stage coverage for upload
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: ./coverage.xml
          if-no-files-found: error

  upload-coverage:
    needs: coverage
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      code-quality: write
      pull-requests: write
    steps:
      - name: Fetch coverage.xml
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: Upload coverage report
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage.xml
          language: python
