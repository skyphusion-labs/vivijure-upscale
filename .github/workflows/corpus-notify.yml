name: corpus-notify

# Merge-driven refresh of the skyphusion-search AI Search corpus. When this repo
# merges to main, fire a repository_dispatch (event type corpus-sync) at
# skyphusion-labs/skyphusion-search so its index refreshes on the merge instead of
# waiting for the receiver's daily schedule (that schedule is the backstop).
#
# NOT a CI gate. This is a SEPARATE workflow from ci: never add it to required
# status checks, and it never blocks this repo's own CI or merges. But a failed
# dispatch is LOUD -- the run goes red (no `|| true` on the dispatch, no swallowed
# curl error), matching the house no-silent-failure standard. The receiver's daily
# schedule covers any dropped or failed notify.
#
# Auth is the org secret SEARCH_DISPATCH_TOKEN (visibility: all repos): a
# fine-grained PAT scoped to fire the dispatch on skyphusion-search only.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: corpus-notify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch corpus-sync to skyphusion-search
        env:
          SEARCH_DISPATCH_TOKEN: ${{ secrets.SEARCH_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Presence-check WITHOUT echoing the value (${VAR:+SET} only). Fail loud if
          # the org secret is missing rather than POSTing an unauthenticated request.
          if [ -z "${SEARCH_DISPATCH_TOKEN:+SET}" ]; then
            echo "::error::SEARCH_DISPATCH_TOKEN is unset -- cannot notify skyphusion-search (org secret, visibility all)."
            exit 1
          fi
          # Build the payload with jq so repo/sha are injected as DATA, never as shell.
          payload="$(jq -nc --arg repo "$SOURCE_REPO" --arg sha "$SOURCE_SHA" \
            '{event_type:"corpus-sync",client_payload:{source:$repo,sha:$sha}}')"
          code="$(curl -sS -o /tmp/dispatch_resp.txt -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${SEARCH_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/skyphusion-labs/skyphusion-search/dispatches \
            -d "$payload")"
          echo "repository_dispatch (corpus-sync) -> HTTP ${code}"
          # GitHub returns 204 No Content on a successful dispatch; anything else fails.
          if [ "$code" != "204" ]; then
            echo "::error::corpus-sync dispatch failed (HTTP ${code})."
            cat /tmp/dispatch_resp.txt || true
            exit 1
          fi
          echo "corpus-sync dispatch accepted (skyphusion-search will reindex)."
